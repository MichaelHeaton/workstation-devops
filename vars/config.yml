---
# Single configuration file for this repo — edit here, not roles or playbook.yml.

# --- Projects layout ---------------------------------------------------------

projects_root: "{{ ansible_facts['env']['HOME'] }}/Projects"

# Top-level ~/Projects folders. finder_tag sets macOS color; buckets without it get tags cleared on apply.
projects_buckets:
  - name: personal
    finder_tag: Orange
  - name: scratch
  - name: workspace
  - name: adobe
    finder_tag: Red
  - name: specterrealm
    finder_tag: Green
  - name: uvcyber
    finder_tag: Purple
  - name: archive

# --- Git clones (workstation-devops is cloned by scripts/install.sh) ----------

# SSH hostnames used by managed_repos (added to ~/.ssh/known_hosts before clone).
git_ssh_hosts:
  - github.com
  - gitlab.com

# GitHub: intentional long-term keeps. Everything else migrates to GitLab or is retired.
# GitLab: specterrealm homelab + esports (see glab repo list --member).
managed_repos:
  # GitLab — Michael-Heaton
  - repo: git@gitlab.com:Michael-Heaton/workspace.git
    dest: workspace
  - repo: git@gitlab.com:Michael-Heaton/nexus.git
    dest: personal/nexus

  # GitHub — keeps
  - repo: git@github.com:MichaelHeaton/claude-skills.git
    dest: personal/claude-skills
    install_cmd: bash install.sh
  - repo: git@github.com:MichaelHeaton/memex.git
    dest: personal/memex
  - repo: git@github.com:MichaelHeaton/MichaelHeaton.git
    dest: personal/MichaelHeaton

  # GitLab — specterrealm/homelab → ~/Projects/specterrealm/homelab/
  - repo: git@gitlab.com:specterrealm/homelab/homelab-core.git
    dest: specterrealm/homelab/homelab-core
  - repo: git@gitlab.com:specterrealm/homelab/homelab-automation.git
    dest: specterrealm/homelab/homelab-automation
  - repo: git@gitlab.com:specterrealm/homelab/homelab-esports.git
    dest: specterrealm/homelab/homelab-esports
  - repo: git@gitlab.com:specterrealm/homelab/homelab-identity.git
    dest: specterrealm/homelab/homelab-identity
  - repo: git@gitlab.com:specterrealm/homelab/homelab-infra.git
    dest: specterrealm/homelab/homelab-infra
  - repo: git@gitlab.com:specterrealm/homelab/homelab-observability.git
    dest: specterrealm/homelab/homelab-observability
  - repo: git@gitlab.com:specterrealm/homelab/homelab-streaming.git
    dest: specterrealm/homelab/homelab-streaming
  - repo: git@gitlab.com:specterrealm/homelab/homelab-cicd-templates.git
    dest: specterrealm/homelab/homelab-cicd-templates
  - repo: git@gitlab.com:specterrealm/homelab/ansible-role-base-server.git
    dest: specterrealm/homelab/ansible-role-base-server
  - repo: git@gitlab.com:specterrealm/homelab/ansible-role-cloudflared.git
    dest: specterrealm/homelab/ansible-role-cloudflared
  - repo: git@gitlab.com:specterrealm/homelab/ansible-role-factorio.git
    dest: specterrealm/homelab/ansible-role-factorio
  - repo: git@gitlab.com:specterrealm/homelab/ansible-role-minecraft.git
    dest: specterrealm/homelab/ansible-role-minecraft
  - repo: git@gitlab.com:specterrealm/homelab/ansible-role-traefik.git
    dest: specterrealm/homelab/ansible-role-traefik
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-cloudflare-tunnel.git
    dest: specterrealm/homelab/tf-module-cloudflare-tunnel
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-dns-record.git
    dest: specterrealm/homelab/tf-module-dns-record
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-docker-service.git
    dest: specterrealm/homelab/tf-module-docker-service
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-game-server.git
    dest: specterrealm/homelab/tf-module-game-server
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-ssl-cert.git
    dest: specterrealm/homelab/tf-module-ssl-cert
  - repo: git@gitlab.com:specterrealm/homelab/tf-module-vm-lxc.git
    dest: specterrealm/homelab/tf-module-vm-lxc

  # GitLab — specterrealm/esports → ~/Projects/specterrealm/esport/
  - repo: git@gitlab.com:specterrealm/esports/factorio/factorio-blueprints.git
    dest: specterrealm/esport/factorio-blueprints
  - repo: git@gitlab.com:specterrealm/esports/minecraft/minecraft-modpack-family.git
    dest: specterrealm/esport/minecraft-modpack-family
  - repo: git@gitlab.com:specterrealm/esports/minecraft/minecraft-modpack-cp-verdant.git
    dest: specterrealm/esport/minecraft-modpack-cp-verdant
  - repo: git@gitlab.com:specterrealm/esports/minecraft/minecraft-modpack-ltm.git
    dest: specterrealm/esport/minecraft-modpack-ltm

# --- Bootstrap / install.sh (keep in sync with clone path above) --------------

workstation_devops_repo: git@gitlab.com:Michael-Heaton/workstation-devops.git
workstation_devops_repo_https: https://gitlab.com/Michael-Heaton/workstation-devops.git
workstation_devops_dest: personal/workstation-devops
workstation_devops_branch: main

# --- Homebrew (macOS only; ansible/chezmoi installed elsewhere) ---------------

homebrew_formulae:
  # tier 1 — core dev workstation
  - gh
  - glab
  - jq
  - yq
  - direnv
  - terraform
  - tflint
  - yamllint
  - ansible-lint
  - pre-commit
  - shellcheck
  - mas
  # tier 2 — homelab
  - packer
  - kubernetes-cli
  - minikube
  - consul
  # gaming — modpack dev (packwiz has no Homebrew formula; installed via go install below)
  - go

# Go modules installed with `go install` into homebrew_go_bin_path (default: brew bin).
homebrew_go_bin_path: "{{ brew_prefix }}/bin"
homebrew_go_binaries:
  - module: github.com/packwiz/packwiz@latest
    name: packwiz

homebrew_casks:
  # tier 1
  - 1password
  - brave-browser
  - claude
  - cursor
  - github
  - iterm2
  - visual-studio-code
  - docker-desktop
  - obsidian
  # tier 2
  - lens
  - balenaetcher
  - synology-drive
  # gaming (no MAS equivalent — Homebrew cask)
  - steam
  - curseforge
  - prismlauncher
  # comms / editors (MAS when available — see homebrew_mas_apps)
  - microsoft-teams
  - signal
  - sublime-text

# Skip `brew install --cask` when bundle exists (manual .pkg install). First-time Teams still needs interactive sudo in Terminal.
homebrew_cask_app_bundles:
  microsoft-teams: Microsoft Teams.app

# Mac App Store — preferred over cask when the app is on both (requires `mas` formula).
homebrew_mas_apps:
  - id: "803453959"
    name: Slack

# --- Platform (used by homebrew / chezmoi roles) ------------------------------

is_mac: "{{ ansible_facts['os_family'] == 'Darwin' }}"
is_linux: "{{ ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'RedHat' }}"
brew_prefix: "{{ '/opt/homebrew' if ansible_facts['machine'] == 'arm64' else '/usr/local' }}"
brew_bin: "{{ brew_prefix }}/bin/brew"
