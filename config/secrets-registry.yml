---
# Secrets registry — metadata only (no passwords, no tokens).
# Machine-specific values: group_vars/work.local.yml (gitignored) + Memex work.local.yml.
# Verify: make secrets-check   Setup helpers: make secrets-help

version: 1

keychain_items:
  vault_okta:
    service: work-vault-okta
    label: work-vault-okta
    account_var: work_username
    ansible_var: vault_okta_keychain_service
    role: vault_tools
    make_target: secrets-vault-okta
    docs: docs/work/vault-tools.md
    notes: >-
      Corp LDAP password for vault login -method=okta (vl / vault_mgmt).
      In Keychain Access: Where = service (-s); Name/label can differ.

runtime_env:
  klam_artifactory_api_key:
    var: KLAM_ARTIFACTORY_API_KEY
    purpose: KLAM pip install from Artifactory
    never_commit: true
    docs: docs/work/klam.md

local_files:
  atlassian_mcp:
    path: ~/.mcp/env/atlassian.env
    template: dotfiles/dot_mcp/env/atlassian.env.example
    purpose: Atlassian MCP (Jira/Confluence API tokens)
    never_commit: true
    make_target: secrets-atlassian-env
    docs: docs/secrets-keychain.md

# Planned — employer 1Password (not implemented yet)
planned_onepassword:
  status: future
  docs: docs/secrets-keychain.md#planned-1password-employer
  notes: >-
    Employer org 1Password rollout TBD. Vault already supports op:// via vault_okta_op_ref;
    extend to KLAM, Atlassian MCP, and make secrets-1p-* helpers when op CLI + vault are standard on work Macs.

  vault_okta:
    today: vault_okta_op_ref in group_vars/work.local.yml + op read in vault_functions.zsh
    future_make_target: secrets-1p-vault-okta

  klam_artifactory_api_key:
    today: KLAM_ARTIFACTORY_API_KEY env at apply time
    future: op:// item or op run wrapper; optional make secrets-1p-klam

  atlassian_mcp:
    today: ~/.mcp/env/atlassian.env (local file)
    future: op inject into env file or MCP env from op run; document op:// paths in Memex only
