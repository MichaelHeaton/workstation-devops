---
# Standalone profile setup / re-detect — does not apply packages or dotfiles.
#   ansible-playbook profile_detect.yml -e force_reprofile=true

- name: Detect workstation profile
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - group_vars/all.yml
  tasks:
    - name: Run profile detection tasks
      ansible.builtin.include_tasks: tasks/profile_detect.yml
