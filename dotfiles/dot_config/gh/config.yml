# gh CLI preferences (workstation-devops chezmoi)
# Auth tokens live in ~/.config/gh/hosts.yml — never commit or manage with chezmoi.
version: 1
git_protocol: https
editor:
prompt: enabled
prefer_editor_prompt: disabled
pager:
aliases:
    co: pr checkout
http_unix_socket:
browser:
color_labels: disabled
accessible_colors: disabled
accessible_prompter: disabled
spinner: enabled
