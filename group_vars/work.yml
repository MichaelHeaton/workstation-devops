---
# Adobe / work machine profile — CES Vault team workstation.

# Default feature tags for work machines (override: -e 'workstation_tags_extra=[home]').
workstation_tags_profile:
  - work

projects_buckets:
  - name: adobe
  - name: personal
  - name: scratch
  - name: workspace

managed_repos:
  - repo: "git@github.com:{{ adobe_username }}_adobe/adobe-cursor-rules.git"
    dest: adobe/adobe-cursor-rules

# Adobe IT often installs apps outside Homebrew — detect only, do not brew install.
homebrew_install_packages: false
homebrew_upgrade: false
homebrew_mas_enabled: false

homebrew_formulae_profile:
  - fzf
  - kubernetes-cli

homebrew_casks_profile:
  - microsoft-teams

homebrew_cask_app_bundles:
  microsoft-teams: Microsoft Teams.app

# AI Spend Tracker — public DMG (no Adobe GitHub SSO). Detect always; install via make apply.
mac_dmg_apps_profile:
  - ai-spend-tracker
mac_dmg_apps_install: true

# Chezmoi identity — override on first run:
#   ansible-playbook site.yml -e 'adobe_username=YOUR_LDAP full_name="Your Name" adobe_email="YOUR_LDAP@adobe.com"'
adobe_username: "{{ ansible_facts['user_id'] }}"
full_name: ""
adobe_email: ""

# GHEC SSH — private key basename under ~/.ssh/ (see docs/work/git-github.md)
ghec_ssh_key: id_ed25519_github
