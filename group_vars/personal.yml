homebrew_install_packages: true
homebrew_mas_enabled: true

homebrew_formulae_profile:
  - mas
  - packer
  - kubernetes-cli
  - minikube
  - consul
  - go

homebrew_go_binaries:
  - module: github.com/packwiz/packwiz@latest
    name: packwiz

homebrew_casks_profile:
  - lens
  - balenaetcher
  - synology-drive
  - steam
  - curseforge
  - prismlauncher
  - microsoft-teams
  - signal
  - sublime-text

homebrew_cask_app_bundles:
  microsoft-teams: Microsoft Teams.app

homebrew_mas_apps:
  - id: "803453959"
    name: Slack
    bundle: Slack.app
