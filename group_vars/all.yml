---
# Shared workstation configuration — profile-specific lists live in work.yml / personal.yml.

workstation_profile_file: "{{ ansible_facts['env']['HOME'] }}/.workstation_profile"

# Feature tag allowlist — merged in site.yml with profile + extra tags (see docs/tags.md).
# Baseline runs on every machine unless skipped via make apply SKIP_TAGS=…
workstation_tags_baseline:
  - dotfiles
  - shell
  - editors

# --- Projects layout ---------------------------------------------------------

projects_root: "{{ ansible_facts['env']['HOME'] }}/Projects"

# Finder color tags (work + personal). Profile bucket lists reference these by name.
projects_bucket_finder_tags:
  work: Red
  personal: Orange
  specterrealm: Green
  uvcyber: Purple

git_ssh_hosts:
  - github.com
  - gitlab.com

# --- Bootstrap / install.sh --------------------------------------------------

# Personal GitHub on multi-account Macs: git@github.com-personal:… (see memex Agents/11-development-standards.md)
workstation_devops_repo: git@github.com-personal:MichaelHeaton/workstation-devops.git
workstation_devops_repo_https: https://github.com/MichaelHeaton/workstation-devops.git
workstation_devops_dest: personal/workstation-devops
workstation_devops_branch: main

# Cloned on every profile (work + personal); merged with profile managed_repos in site.yml.
managed_repos_common:
  # GitHub repo is "workspaces"; local bucket stays ~/Projects/workspace
  - repo: git@github.com-personal:MichaelHeaton/workspaces.git
    dest: workspace
  # dest must match workstation_devops_dest (preflight reads YAML without Jinja)
  - repo: git@github.com-personal:MichaelHeaton/workstation-devops.git
    dest: personal/workstation-devops
  - repo: git@github.com-personal:MichaelHeaton/claude-skills.git
    dest: personal/claude-skills
  - repo: git@github.com-personal:MichaelHeaton/ai-skills.git
    dest: personal/ai-skills
    version: main
    # hooks-install: git commit + pre-push lint (requires pre-commit formula below)
    install_cmd: bash -c 'make install-system && make hooks-install'
  - repo: git@github.com-personal:MichaelHeaton/memex.git
    dest: personal/memex

# ff-only pull for repos with install_cmd; skipped when the working tree is dirty
managed_repos_pull: true

# --- Packages (detect-first; merged with profile extras in site.yml) ----------
#
# homebrew_install_packages — when false (work profile), only detect PATH/apps; no brew install
# homebrew_mas_enabled      — personal only by default; avoids MAS on locked-down Apple IDs
# homebrew_upgrade          — opt-in brew update && brew upgrade on apply (default off)

homebrew_install_packages: true
homebrew_upgrade: false
homebrew_mas_enabled: false

homebrew_formulae_common:
  - gh
  - glab
  - jq
  - yq
  - direnv
  - terraform
  - yamllint
  - ansible-lint
  - pre-commit
  - shellcheck

homebrew_casks_common:
  - 1password
  - brave-browser
  - claude
  - cursor
  - github
  - iterm2
  - visual-studio-code
  - docker-desktop
  - obsidian

# If the .app exists, homebrew/preflight skip brew install --cask (manual installs count).
homebrew_cask_app_bundles_common:
  1password: 1Password.app
  brave-browser: Brave Browser.app
  claude: Claude.app
  cursor: Cursor.app
  docker-desktop: Docker.app
  github: GitHub Desktop.app
  iterm2: iTerm.app
  obsidian: Obsidian.app
  visual-studio-code: Visual Studio Code.app

homebrew_cask_app_bundles: {}

# GitHub-release DMG apps (not Homebrew). Source may be private; binaries are public.
mac_dmg_apps_catalog:
  ai-spend-tracker:
    display_name: AI Spend Tracker
    bundle: AISpendTracker.app
    github_repo: roymerrill/ai-spend-tracker-releases
    asset_name: AISpendTracker.dmg

mac_dmg_apps_common: []
mac_dmg_apps_install: false

homebrew_mas_apps: []
homebrew_go_bin_path: "{{ brew_prefix }}/bin"
homebrew_go_binaries: []

# --- macOS defaults (Darwin only; roles/macos_defaults) ------------------------

macos_defaults_enabled: true
macos_defaults_apple_notes_enabled: true
# Monostyled code blocks (⌘⇧M) have no known defaults key; smart-quote/dash off helps pasted code.
macos_defaults_apple_notes_domain: com.apple.Notes
macos_defaults_apple_notes:
  NSAutomaticQuoteSubstitutionEnabled: false
  NSAutomaticDashSubstitutionEnabled: false
# Set true only if you want NSGlobalDomain smart typography disabled repo-wide.
macos_defaults_global_smart_typography: false

# --- Platform ------------------------------------------------------------------

is_mac: "{{ ansible_facts['os_family'] == 'Darwin' }}"
is_linux: "{{ ansible_facts['os_family'] == 'Debian' or ansible_facts['os_family'] == 'RedHat' }}"
brew_prefix: "{{ '/opt/homebrew' if ansible_facts['machine'] == 'arm64' else '/usr/local' }}"
brew_bin: "{{ brew_prefix }}/bin/brew"
