---
# Tag resolution: bucket finder_tag override → projects_bucket_finder_tags (all.yml) → clear.

- name: Build resolved Finder tag lookup
  ansible.builtin.set_fact:
    resolved_finder_tags: >-
      {{ resolved_finder_tags | default({})
         | combine({item.name: item.finder_tag | default(projects_bucket_finder_tags.get(item.name, 'clear'))}) }}
  loop: "{{ projects_buckets }}"
  loop_control:
    label: "{{ item.name }}"

- name: Stat project directories
  ansible.builtin.stat:
    path: "{{ projects_root }}/{{ item.name }}"
  loop: "{{ projects_buckets }}"
  loop_control:
    label: "{{ item.name }}"
  register: dir_state

- name: Show directories that would be created (dry-run)
  ansible.builtin.debug:
    msg: >-
      Would create {{ projects_root }}/{{ item.item.name }}{{
        ' (Finder tag: ' ~ resolved_finder_tags[item.item.name] ~ ')'
        if resolved_finder_tags[item.item.name] != 'clear'
        else ' (clear Finder tag)'
      }}
  loop: "{{ dir_state.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - dry_run | default(false) | bool
    - not item.stat.exists

- name: Get current Finder tags
  ansible.builtin.command:
    argv:
      - python3
      - "{{ role_path }}/files/get_finder_tag.py"
      - "{{ projects_root }}/{{ item.name }}"
  loop: "{{ projects_buckets }}"
  loop_control:
    label: "{{ item.name }}"
  register: current_finder_tags
  changed_when: false
  when: is_mac | bool

- name: Show Finder tags that would be synced (dry-run)
  ansible.builtin.debug:
    msg: >-
      Would {{ 'set Finder tag ' ~ resolved_finder_tags[item.item.name]
        if resolved_finder_tags[item.item.name] != 'clear'
        else 'clear Finder tag' }}
      on {{ projects_root }}/{{ item.item.name }}
  loop: "{{ current_finder_tags.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - dry_run | default(false) | bool
    - is_mac | bool
    - item.item.name in (dir_state.results | selectattr('stat.exists') | map(attribute='item.name') | list)
    - resolved_finder_tags[item.item.name] != (item.stdout | default('') | trim)

- name: Create Projects directory structure
  ansible.builtin.file:
    path: "{{ projects_root }}/{{ item.name }}"
    state: directory
    mode: "0755"
  loop: "{{ projects_buckets }}"
  loop_control:
    label: "{{ item.name }}"
  when: not (dry_run | default(false) | bool)

- name: Sync Finder tags on project buckets (macOS)
  ansible.builtin.command:
    argv:
      - python3
      - "{{ role_path }}/files/set_finder_tag.py"
      - "{{ projects_root }}/{{ item.item.name }}"
      - "{{ resolved_finder_tags[item.item.name] }}"
  loop: "{{ current_finder_tags.results | default([]) }}"
  loop_control:
    label: "{{ item.item.name }}"
  when:
    - not (dry_run | default(false) | bool)
    - is_mac | bool
    - resolved_finder_tags[item.item.name] != (item.stdout | default('') | trim)
  changed_when: true
