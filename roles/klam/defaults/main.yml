---
# KLAM CLI — Artifactory pip install + shell aliases (work profile).
# Set klam_artifactory_host in group_vars/work.local.yml (see work.local.yml.example).

klam_enabled: true
klam_pip_package: klam
klam_artifactory_host: ""
klam_artifactory_pypi_path: artifactory/api/pypi/pypi-klam-cli-release/simple

# Work LDAP for the pip index (defaults to work_username; override with WORK_USERNAME env)
klam_artifactory_username: "{{ work_username }}"

# macOS Homebrew Python (PEP 668) — pass --break-system-packages to pip install --user
klam_pip_break_system_packages: true
