---
# Clones repos in managed_repos (managed_repos_common + group_vars/<profile>.yml).
# Checks for .git — parent dirs may exist empty from the directories role.

- name: Ensure .ssh directory exists
  ansible.builtin.file:
    path: "{{ ansible_facts['env']['HOME'] }}/.ssh"
    state: directory
    mode: "0700"
  when: not (dry_run | default(false) | bool)

- name: Add git provider SSH host keys to known_hosts
  ansible.builtin.shell:
    cmd: |
      if ssh-keygen -F {{ item }} &>/dev/null; then
        exit 0
      fi
      ssh-keyscan -H -t ed25519 {{ item }} 2>/dev/null >> ~/.ssh/known_hosts && echo added
  loop: "{{ git_ssh_hosts }}"
  loop_control:
    label: "{{ item }}"
  register: known_hosts_result
  changed_when: "'added' in (known_hosts_result.stdout | default(''))"
  when:
    - not (dry_run | default(false) | bool)
    - managed_repos | selectattr('repo', 'search', 'git@|ssh://') | list | length > 0

- name: Check which managed repos are already cloned
  ansible.builtin.stat:
    path: "{{ projects_root }}/{{ item.dest }}/.git"
  register: repo_state
  loop: "{{ managed_repos }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Show repos that would be cloned (dry-run)
  ansible.builtin.debug:
    msg: >-
      Would clone {{ item.item.repo }} → {{ projects_root }}/{{ item.item.dest }}{{
        ' and run: ' + item.item.install_cmd if item.item.install_cmd is defined else ''
      }}
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - dry_run | default(false) | bool
    - not item.stat.exists

# ansible.builtin.git always checks out init.defaultBranch (e.g. Main) after clone;
# that fails on empty remotes with no refs. Plain git clone matches manual behavior.
- name: Clone managed repos
  ansible.builtin.command:
    cmd: >-
      git clone
      {% if item.item.version is defined %}-b {{ item.item.version | quote }}{% endif %}
      {{ item.item.repo | quote }}
      {{ (projects_root ~ '/' ~ item.item.dest) | quote }}
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  register: repo_clone_results
  failed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - not item.stat.exists

- name: Fail when required managed repo clone failed
  ansible.builtin.fail:
    msg: >-
      git clone failed for {{ item.item.item.dest }} (rc={{ item.rc }}).
      {{ item.stderr | default('') | truncate(400, True) }}
  loop: "{{ repo_clone_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.dest | default('unknown') }}"
  when:
    - repo_clone_results is defined
    - not item.skipped | default(false)
    - item.rc | default(0) != 0
    - not (item.item.item.optional | default(false) | bool)

- name: Warn when optional managed repo clone failed
  ansible.builtin.debug:
    msg: >-
      Optional repo {{ item.item.item.dest }} not cloned (rc={{ item.rc }}).
      Connect VPN if the org uses an IP allow list, or clone manually.
      {{ item.stderr | default('') | truncate(300, True) }}
  loop: "{{ repo_clone_results.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.dest | default('unknown') }}"
  when:
    - repo_clone_results is defined
    - not item.skipped | default(false)
    - item.rc | default(0) != 0
    - item.item.item.optional | default(false) | bool

- name: Repoint origin to configured URL for existing repos (dry-run)
  ansible.builtin.debug:
    msg: "Would repoint origin: {{ item.item.dest }} → {{ item.item.repo }}"
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - dry_run | default(false) | bool
    - item.stat.exists

- name: Repoint origin to configured URL for existing repos
  ansible.builtin.shell:
    cmd: |
      current=$(git remote get-url origin 2>/dev/null || echo "")
      if [ -n "$current" ] && [ "$current" != "{{ item.item.repo }}" ]; then
        git remote set-url origin "{{ item.item.repo }}"
        echo "repointed from $current"
      fi
    chdir: "{{ projects_root }}/{{ item.item.dest }}"
  register: repoint_result
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - not (dry_run | default(false) | bool)
    - item.stat.exists
  changed_when: "'repointed' in (repoint_result.stdout | default(''))"

- name: Run post-clone install commands
  ansible.builtin.command:
    cmd: "{{ item.item.install_cmd }}"
    chdir: "{{ projects_root }}/{{ item.item.dest }}"
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - not (dry_run | default(false) | bool)
    - not item.stat.exists
    - item.item.install_cmd is defined
  changed_when: true

- name: Show repos that would be pulled (dry-run)
  ansible.builtin.debug:
    msg: >-
      Would pull {{ projects_root }}/{{ item.item.dest }}
      (skipped when working tree has local changes)
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - dry_run | default(false) | bool
    - item.stat.exists
    - item.item.install_cmd is defined
    - managed_repos_pull | default(true) | bool

- name: Check working tree before pull
  ansible.builtin.command:
    cmd: git status --porcelain
    chdir: "{{ projects_root }}/{{ item.item.dest }}"
  register: repo_worktree_status
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  changed_when: false
  when:
    - not (dry_run | default(false) | bool)
    - item.stat.exists
    - item.item.install_cmd is defined
    - managed_repos_pull | default(true) | bool

- name: Warn when pull skipped due to local changes
  ansible.builtin.debug:
    msg: >-
      Skipping pull for {{ item.item.item.dest }} — local modifications present.
      Commit, stash, or discard changes, then re-run make apply.
  loop: "{{ repo_worktree_status.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.dest }}"
  when:
    - not item.skipped | default(false)
    - item.stdout | default('') | trim | length > 0

- name: Pull latest commits for existing repos (ff-only, clean tree only)
  ansible.builtin.command:
    cmd: git pull --ff-only
    chdir: "{{ projects_root }}/{{ item.item.item.dest }}"
  register: pull_result
  loop: "{{ repo_worktree_status.results | default([]) }}"
  loop_control:
    label: "{{ item.item.item.dest }}"
  when:
    - not item.skipped | default(false)
    - item.stdout | default('') | trim | length == 0
  changed_when: >-
    pull_result.rc == 0
    and 'Already up to date' not in (pull_result.stdout | default(''))
  failed_when: pull_result.rc != 0

- name: Show install commands that would re-run for existing repos (dry-run)
  ansible.builtin.debug:
    msg: "Would re-run: {{ item.item.install_cmd }} in {{ projects_root }}/{{ item.item.dest }}"
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - dry_run | default(false) | bool
    - item.stat.exists
    - item.item.install_cmd is defined

- name: Re-run install commands for existing repos
  ansible.builtin.command:
    cmd: "{{ item.item.install_cmd }}"
    chdir: "{{ projects_root }}/{{ item.item.dest }}"
  loop: "{{ repo_state.results }}"
  loop_control:
    label: "{{ item.item.dest }}"
  when:
    - not (dry_run | default(false) | bool)
    - item.stat.exists
    - item.item.install_cmd is defined
  changed_when: true
